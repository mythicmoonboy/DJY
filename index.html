<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJY HUB | INSTANT SYNC</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #ff003c; --bg: #0a0a0a; --card: #151515; --glow: 0 0 15px #ff003c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: var(--glow); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 10px; cursor: pointer; text-transform: uppercase; }
        button:active { transform: scale(0.9); }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; display: none; }
        .active { display: block; }
        .hero { text-align: center; padding: 40px; border: 1px solid var(--neon); background: rgba(255,0,60,0.05); }
        .btn-neon { display: inline-block; padding: 12px 24px; border: 2px solid var(--neon); color: white; font-weight: bold; background: none; cursor: pointer; transition: 0.2s; }
        .btn-neon:hover { background: var(--neon); box-shadow: var(--glow); }
        .tourney-card { background: var(--card); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; }
        #bracket-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow: auto; padding: 50px; }
        .match-box { position: absolute; width: 140px; height: 60px; background: #111; border: 1px solid var(--neon); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; z-index: 5; }
    </style>
</head>
<body onload="initApp()">

<nav>
    <button onclick="tab('home')">Home</button>
    <button onclick="tab('tournament')">Tournament</button>
    <button onclick="tab('admin')">Admin</button>
</nav>

<div id="home" class="container active">
    <div class="hero">
        <h1 style="color: var(--neon); text-shadow: var(--glow); font-size: 3rem;">DJY MLBB</h1>
        <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none">Tournament Discord</a>
    </div>
</div>

<div id="tournament" class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-neon" onclick="loadData('upcoming')">Upcoming</button>
        <button class="btn-neon" onclick="loadData('live')">Live</button>
        <button class="btn-neon" onclick="loadData('finished')">Finished</button>
    </div>
    <div id="list-display"></div>
</div>

<div id="bracket-screen">
    <button onclick="document.getElementById('bracket-screen').style.display='none'" style="color:white; background:red; padding:10px; cursor:pointer;">EXIT</button>
    <h2 id="b-title" style="text-align:center; color:var(--neon);">Bracket</h2>
    <div style="position:relative; width:1000px; height:600px; margin:auto;" id="bracket-area"></div>
</div>

<div id="admin" class="container">
    <div id="login-form" class="hero" style="max-width: 400px; margin: auto;">
        <input type="text" id="adm-u" placeholder="Username">
        <input type="password" id="adm-p" placeholder="Password">
        <button class="btn-neon" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="hero">
            <h2 id="welcome-msg">Dashboard</h2>
            <button onclick="logout()">[Logout]</button>
            <hr>
            <input id="t-name" placeholder="Tournament Name">
            <input id="t-prize" placeholder="Prize Pool">
            <select id="t-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
            </select>
            <button class="btn-neon" onclick="upload()">PUBLISH</button>
        </div>
        <div id="moonboi-ctrl" style="display:none; border: 2px solid gold; padding: 20px; margin-top: 20px;">
            <h3 style="color:gold">Head Admin Control</h3>
            <input id="new-u" placeholder="New User"><input id="new-p" placeholder="New Pass">
            <button class="btn-neon" onclick="addAdmin()">Add Admin</button>
            <div id="admin-list-box" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://yfsjflymbkbfiketvxof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bOr8dIV2-Zt_9CUpboVsBQ_pzwpyRZw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function initApp() {
        const session = localStorage.getItem('djy_session');
        if(session) {
            const user = JSON.parse(session);
            showDash(user.isHead, user.name);
        }
        loadData('upcoming');
    }

    async function login() {
        const u = document.getElementById('adm-u').value;
        const p = document.getElementById('adm-p').value;
        if(u === "moonboi" && p === "123") {
            saveSession(true, "moonboi");
        } else {
            const { data } = await _supabase.from('admin_accounts').select('*').eq('username', u).eq('password', p);
            if(data && data.length > 0) saveSession(false, u);
            else alert("Login Failed");
        }
    }

    function saveSession(isHead, name) {
        localStorage.setItem('djy_session', JSON.stringify({ isHead, name }));
        showDash(isHead, name);
    }

    function logout() { localStorage.removeItem('djy_session'); location.reload(); }

    function showDash(isHead, name) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Welcome, " + name;
        if(isHead) { document.getElementById('moonboi-ctrl').style.display = 'block'; fetchAdmins(); }
    }

    function tab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function upload() {
        const status = document.getElementById('t-status').value;
        const { error } = await _supabase.from('tournaments').insert([{
            title: document.getElementById('t-name').value,
            prize: document.getElementById('t-prize').value,
            status: status
        }]);
        if(error) alert(error.message);
        else { alert("Published!"); loadData(status); tab('tournament'); }
    }

    async function loadData(filter) {
        const display = document.getElementById('list-display');
        let { data, error } = await _supabase.from('tournaments').select('*').eq('status', filter);
        
        if(error) { alert("Supabase Error: " + error.message); return; }

        display.innerHTML = (data && data.length > 0) ? "" : `<p style="text-align:center;">No ${filter} tournaments.</p>`;
        data?.forEach(t => {
            display.innerHTML += `<div class="tourney-card" onclick="openB('${t.title}')"><h3>${t.title}</h3><p>${t.prize}</p></div>`;
        });
    }

    function openB(title) {
        document.getElementById('bracket-screen').style.display = 'block';
        document.getElementById('b-title').innerText = title;
        document.getElementById('bracket-area').innerHTML = `<div class="match-box" style="left:50px;top:100px;"><b>Round 1</b><br>TBD vs TBD</div>`;
    }

    async function addAdmin() {
        await _supabase.from('admin_accounts').insert([{ username: document.getElementById('new-u').value, password: document.getElementById('new-p').value }]);
        fetchAdmins();
    }

    async function fetchAdmins() {
        const box = document.getElementById('admin-list-box');
        const { data } = await _supabase.from('admin_accounts').select('*');
        box.innerHTML = "";
        data?.forEach(adm => {
            box.innerHTML += `<div style="display:flex; justify-content:space-between; background:#222; padding:5px; margin:2px;">${adm.username} <button onclick="delAdm('${adm.id}')">X</button></div>`;
        });
    }

    async function delAdm(id) { await _supabase.from('admin_accounts').delete().eq('id', id); fetchAdmins(); }

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, () => {
        loadData('upcoming'); loadData('live');
    }).subscribe();
</script>
</body>
</html>
