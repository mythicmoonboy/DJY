<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJY MLBB HUB | PRO SYSTEM</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #ff003c; --bg: #0a0a0a; --card: #151515; --glow: 0 0 15px #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: var(--glow); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        
        button:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-neon { display: inline-block; padding: 12px 24px; border: 2px solid var(--neon); color: white; font-weight: bold; background: none; cursor: pointer; transition: 0.2s; border-radius: 4px; text-transform: uppercase; }
        .btn-neon:hover { background: var(--neon); box-shadow: var(--glow); }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; padding: 40px; border: 1px solid var(--neon); background: rgba(255,0,60,0.05); border-radius: 8px; }
        .tourney-card { background: var(--card); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; cursor: pointer; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 4px; }
        
        /* BRACKET CSS */
        .bracket-wrapper { display: flex; align-items: center; gap: 20px; background: #000; padding: 20px; border: 1px dashed var(--neon); margin-top: 10px; overflow-x: auto; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; gap: 20px; }
        .match-box { background: #222; border: 1px solid #444; padding: 10px; width: 120px; text-align: center; font-size: 12px; position: relative; }
        .match-box::after { content: ''; position: absolute; right: -20px; top: 50%; width: 20px; height: 2px; background: var(--neon); }
        .winner-box { border-color: gold; color: gold; font-weight: bold; }
        .winner-box::after { display: none; }

        .admin-status-box { background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin: 5px 0; border-radius: 4px; }
    </style>
</head>
<body onload="checkPersistentLogin()">

<nav>
    <button onclick="tab('home')">Home</button>
    <button onclick="tab('tournament')">Tournament</button>
    <button onclick="tab('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="container active">
    <div class="hero">
        <h1 style="color: var(--neon); text-shadow: var(--glow); font-size: 3rem;">DJY MLBB</h1>
        <p>2026 Automatic Bracket System Hub.</p>
        <div style="margin-top: 30px;">
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none">Tourney Discord</a>
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none; margin-left:10px;">Community Discord</a>
        </div>
    </div>
</div>

<!-- TOURNAMENT -->
<div id="tournament" class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-neon" onclick="loadData('upcoming')">Upcoming</button>
        <button class="btn-neon" onclick="loadData('live')">Live</button>
        <button class="btn-neon" onclick="loadData('finished')">Finished</button>
    </div>
    <div id="list-display">Connecting...</div>
</div>

<!-- ADMIN -->
<div id="admin" class="container">
    <div id="login-form" class="hero" style="max-width: 400px; margin: auto;">
        <h2>ADMIN LOGIN</h2>
        <input type="text" id="adm-u" placeholder="Username">
        <input type="password" id="adm-p" placeholder="Password">
        <button class="btn-neon" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="hero">
            <h2 id="welcome-msg">Admin Dashboard</h2>
            <button class="btn-neon" onclick="logout()" style="border-color:gray; font-size:10px;">LOGOUT</button>
            <hr border-color="var(--neon)">
            <h3>Create Tournament</h3>
            <input id="t-name" placeholder="Tournament Name">
            <input id="t-prize" placeholder="Prize Pool">
            <select id="t-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
            </select>
            <button class="btn-neon" style="width:100%;" onclick="uploadTournament()">PUBLISH</button>
        </div>

        <div class="admin-status-box">
            <h3>Manage Tournaments</h3>
            <div id="admin-manage-list"></div>
        </div>

        <div id="moonboi-ctrl" style="display:none; border: 2px solid gold; padding: 20px; margin-top: 30px;">
            <h3 style="color:gold">HEAD ADMIN (Moonboi)</h3>
            <input id="new-adm-u" placeholder="New Admin User">
            <input id="new-adm-p" placeholder="New Admin Pass">
            <button class="btn-neon" style="border-color:gold;" onclick="addAdminAcc()">ADD ADMIN</button>
            <div id="admin-list-box"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://yfsjflymbkbfiketvxof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bOr8dIV2-Zt_9CUpboVsBQ_pzwpyRZw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- PERSISTENT LOGIN ---
    function checkPersistentLogin() {
        const session = localStorage.getItem('djy_admin');
        if(session) {
            const user = JSON.parse(session);
            showDashboard(user.isHead, user.name);
        }
    }

    async function login() {
        const u = document.getElementById('adm-u').value;
        const p = document.getElementById('adm-p').value;
        if(u === "moonboi" && p === "123") {
            saveSession(true, "moonboi");
        } else {
            const { data } = await _supabase.from('admin_accounts').select('*').eq('username', u).eq('password', p);
            if(data && data.length > 0) saveSession(false, u);
            else alert("Wrong Credentials!");
        }
    }

    function saveSession(isHead, name) {
        localStorage.setItem('djy_admin', JSON.stringify({ isHead, name }));
        showDashboard(isHead, name);
    }

    function logout() {
        localStorage.removeItem('djy_admin');
        location.reload();
    }

    function showDashboard(isHead, name) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Welcome, " + name;
        if(isHead) { document.getElementById('moonboi-ctrl').style.display = 'block'; fetchAdmins(); }
        fetchManageList();
    }

    function tab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'tournament') loadData('upcoming');
    }

    // --- BRACKET GENERATION ---
    function generateBracketHTML() {
        return `
            <div class="bracket-wrapper">
                <div class="bracket-column">
                    <div class="match-box">Team A</div>
                    <div class="match-box">Team B</div>
                </div>
                <div class="bracket-column">
                    <div class="match-box winner-box">WINNER TBD</div>
                </div>
            </div>`;
    }

    async function uploadTournament() {
        await _supabase.from('tournaments').insert([{
            title: document.getElementById('t-name').value,
            prize: document.getElementById('t-prize').value,
            status: document.getElementById('t-status').value
        }]);
        alert("Published!");
        fetchManageList();
    }

    async function loadData(filter) {
        const display = document.getElementById('list-display');
        let { data } = await _supabase.from('tournaments').select('*').eq('status', filter).order('created_at', { ascending: false });
        display.innerHTML = (data && data.length > 0) ? "" : `<p>No ${filter} tournaments.</p>`;
        data?.forEach(t => {
            display.innerHTML += `
                <div class="tourney-card">
                    <h3>${t.title}</h3>
                    <p>Prize: ${t.prize}</p>
                    <p style="font-size:10px; color:var(--neon)">BRACKET VIEW:</p>
                    ${generateBracketHTML()}
                </div>`;
        });
    }

    async function fetchManageList() {
        const list = document.getElementById('admin-manage-list');
        let { data } = await _supabase.from('tournaments').select('*').order('created_at', { ascending: false });
        list.innerHTML = "";
        data?.forEach(t => {
            list.innerHTML += `<div class="manage-item"><span>${t.title} (${t.status})</span> <button onclick="deleteT('${t.id}')" style="color:red; background:none; border:none;">Delete</button></div>`;
        });
    }

    async function deleteT(id) {
        await _supabase.from('tournaments').delete().eq('id', id);
        fetchManageList();
    }

    async function fetchAdmins() {
        const box = document.getElementById('admin-list-box');
        const { data } = await _supabase.from('admin_accounts').select('*');
        box.innerHTML = "";
        data?.forEach(adm => {
            box.innerHTML += `<div class="manage-item">${adm.username} <button onclick="deleteAdm('${adm.id}')" style="color:red; background:none; border:none;">X</button></div>`;
        });
    }

    async function addAdminAcc() {
        await _supabase.from('admin_accounts').insert([{ username: document.getElementById('new-adm-u').value, password: document.getElementById('new-adm-p').value }]);
        fetchAdmins();
    }

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, () => {
        loadData('upcoming'); fetchManageList();
    }).subscribe();
</script>
</body>
</html>
