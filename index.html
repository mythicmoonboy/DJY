<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJY MLBB HUB</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #ff003c; --bg: #0a0a0a; --card: #151515; --glow: 0 0 15px #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: var(--glow); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        nav button:hover { color: var(--neon); text-shadow: var(--glow); }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; display: none; }
        .active { display: block; }
        .hero { text-align: center; padding: 40px; border: 1px solid var(--neon); background: rgba(255,0,60,0.05); border-radius: 8px; }
        .btn-neon { display: inline-block; padding: 12px 24px; border: 2px solid var(--neon); color: white; text-decoration: none; font-weight: bold; background: none; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .btn-neon:hover { background: var(--neon); box-shadow: var(--glow); }
        .tourney-card { background: var(--card); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; position: relative; border-radius: 0 8px 8px 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px; }
        .bracket-container { margin-top: 15px; padding: 15px; background: #000; border: 1px dashed #333; display: flex; align-items: center; gap: 15px; overflow-x: auto; }
        .match-box { background: #222; border: 1px solid var(--neon); padding: 8px; min-width: 100px; text-align: center; font-size: 12px; }
        .line { width: 30px; height: 2px; background: var(--neon); }
    </style>
</head>
<body>

<nav>
    <button onclick="tab('home')">Home</button>
    <button onclick="tab('tournament')">Tournament</button>
    <button onclick="tab('admin')">Admin</button>
</nav>

<!-- TAB: HOME -->
<div id="home" class="container active">
    <div class="hero">
        <h1 style="color: var(--neon); text-shadow: var(--glow); font-size: 2.8rem; margin-bottom: 10px;">DJY MLBB</h1>
        <p style="font-size: 1.1rem; color: #ccc;">Official YouTuber & Community Hub.</p>
        <div style="margin-top: 30px;">
            <a href="https://discord.gg" target="_blank" class="btn-neon">Tournament Discord</a>
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="margin-left: 10px;">Community Discord</a>
        </div>
    </div>
</div>

<!-- TAB: TOURNAMENT -->
<div id="tournament" class="container">
    <div style="text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 10px;">
        <button class="btn-neon" onclick="loadData('upcoming')">Upcoming</button>
        <button class="btn-neon" onclick="loadData('live')">Live</button>
        <button class="btn-neon" onclick="loadData('finished')">Finished</button>
    </div>
    <div id="list-display">Connecting...</div>
</div>

<!-- TAB: ADMIN -->
<div id="admin" class="container">
    <div id="login-form" class="hero" style="max-width: 400px; margin: auto;">
        <h2 style="color: var(--neon);">ADMIN LOGIN</h2>
        <input type="text" id="adm-u" placeholder="Username">
        <input type="password" id="adm-p" placeholder="Password">
        <button class="btn-neon" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="hero">
            <h3>Post New Tournament</h3>
            <input id="t-name" placeholder="Tournament Name">
            <input id="t-prize" placeholder="Prize Pool">
            <input id="t-time" placeholder="Date & Time">
            <select id="t-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
            </select>
            <button class="btn-neon" style="width:100%;" onclick="uploadTournament()">PUBLISH</button>
        </div>
        <div id="moonboi-ctrl" style="display:none; border: 2px solid gold; padding: 20px; margin-top: 30px; border-radius: 8px;">
            <h3 style="color:gold">Head Admin: moonboi</h3>
            <button class="btn-neon" style="border-color:gold;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://yfsjflymbkbfiketvxof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bOr8dIV2-Zt_9CUpboVsBQ_pzwpyRZw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function tab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'tournament') loadData('upcoming');
    }

    function login() {
        const u = document.getElementById('adm-u').value;
        const p = document.getElementById('adm-p').value;
        if(u === "moonboi" && p === "123") {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('moonboi-ctrl').style.display = 'block';
        } else { alert("Wrong Username/Password"); }
    }

    async function uploadTournament() {
        const { error } = await _supabase.from('tournaments').insert([{
            title: document.getElementById('t-name').value,
            prize: document.getElementById('t-prize').value,
            time: document.getElementById('t-time').value,
            status: document.getElementById('t-status').value
        }]);
        if(error) alert(error.message);
        else { alert("Published!"); tab('tournament'); }
    }

    async function loadData(filter) {
        const display = document.getElementById('list-display');
        display.innerHTML = `<p>Loading ${filter}...</p>`;
        let { data, error } = await _supabase.from('tournaments').select('*').eq('status', filter).order('created_at', { ascending: false });
        if(error) { display.innerHTML = "Error!"; return; }
        display.innerHTML = (data.length > 0) ? "" : `<p>No tournaments.</p>`;
        data.forEach(t => {
            display.innerHTML += `
                <div class="tourney-card">
                    <h3>${t.title}</h3>
                    <p>Prize: ${t.prize} | Time: ${t.time}</p>
                    <div class="bracket-container">
                        <div><div class="match-box">Team 1</div><div class="match-box" style="margin-top:5px;">Team 2</div></div>
                        <div class="line"></div><div class="match-box" style="border-color: gold;">Winner</div>
                    </div>
                </div>`;
        });
    }

    _supabase.channel('public:tournaments').on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, () => {
        loadData('upcoming'); loadData('live');
    }).subscribe();
</script>
</body>
</html>
