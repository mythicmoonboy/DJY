<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJY MLBB HUB | ADMIN SYSTEM 2026</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #ff003c; --bg: #0a0a0a; --card: #151515; --glow: 0 0 15px #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: var(--glow); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        
        /* BUTTON REACTION */
        button:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-neon { 
            display: inline-block; padding: 12px 24px; border: 2px solid var(--neon); 
            color: white; font-weight: bold; background: none; cursor: pointer; 
            transition: all 0.2s ease; border-radius: 4px; text-transform: uppercase;
        }
        .btn-neon:hover { background: var(--neon); box-shadow: var(--glow); }

        .container { max-width: 800px; margin: 30px auto; padding: 20px; display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; padding: 40px; border: 1px solid var(--neon); background: rgba(255,0,60,0.05); border-radius: 8px; }
        .tourney-card { background: var(--card); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; border-radius: 0 8px 8px 0; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 4px; }
        
        /* ADMIN DASHBOARD BOXES */
        .admin-status-box { background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin: 5px 0; border-radius: 4px; border-left: 3px solid var(--neon); }
        .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .upcoming { background: #555; } .live { background: #00ff44; color: black; } .finished { background: #ff0000; }
    </style>
</head>
<body>

<nav>
    <button onclick="tab('home')">Home</button>
    <button onclick="tab('tournament')">Tournament</button>
    <button onclick="tab('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="container active">
    <div class="hero">
        <h1 style="color: var(--neon); text-shadow: var(--glow); font-size: 2.8rem;">DJY MLBB</h1>
        <p>Welcome to the 2026 Tournament Hub.</p>
        <div style="margin-top: 30px;">
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none">Tournament Discord</a>
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none; margin-left: 10px;">Community Discord</a>
        </div>
    </div>
</div>

<!-- TOURNAMENT -->
<div id="tournament" class="container">
    <div style="text-align: center; margin-bottom: 30px;">
        <button class="btn-neon" onclick="loadData('upcoming')">Upcoming</button>
        <button class="btn-neon" onclick="loadData('live')">Live</button>
        <button class="btn-neon" onclick="loadData('finished')">Finished</button>
    </div>
    <div id="list-display">Connecting...</div>
</div>

<!-- ADMIN -->
<div id="admin" class="container">
    <div id="login-form" class="hero" style="max-width: 400px; margin: auto;">
        <h2 style="color: var(--neon);">ADMIN LOGIN</h2>
        <input type="text" id="adm-u" placeholder="Username">
        <input type="password" id="adm-p" placeholder="Password">
        <button class="btn-neon" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <div class="hero">
            <h2 id="welcome-msg">Admin Dashboard</h2>
            <hr border-color="var(--neon)">
            <h3>Create New Tournament</h3>
            <input id="t-name" placeholder="Tournament Name">
            <input id="t-prize" placeholder="Prize Pool">
            <input id="t-time" placeholder="Date & Time">
            <select id="t-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
            </select>
            <button class="btn-neon" style="width:100%;" onclick="uploadTournament()">PUBLISH TO SITE</button>
        </div>

        <!-- NEW: ADMIN TOURNAMENT MANAGER BOX -->
        <div class="admin-status-box">
            <h3 style="margin-top:0; color:var(--neon);">Live Management Box</h3>
            <p style="font-size: 0.8rem; color:#888;">All admins can see and delete tournaments here:</p>
            <div id="admin-manage-list">Loading...</div>
        </div>

        <!-- HEAD ADMIN: MOONBOI ONLY -->
        <div id="moonboi-ctrl" style="display:none; border: 2px solid gold; padding: 20px; margin-top: 30px; border-radius: 8px;">
            <h3 style="color:gold">HEAD ADMIN (Moonboi)</h3>
            <input id="new-adm-u" placeholder="New Admin Username">
            <input id="new-adm-p" placeholder="New Admin Password">
            <button class="btn-neon" style="border-color:gold; color:gold;" onclick="addAdminAcc()">ADD ADMIN</button>
            <div id="admin-list-box" style="margin-top:15px;"></div>
            <button class="btn-neon" style="margin-top:20px; border-color:#555;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://yfsjflymbkbfiketvxof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bOr8dIV2-Zt_9CUpboVsBQ_pzwpyRZw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function tab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'tournament') loadData('upcoming');
    }

    async function login() {
        const u = document.getElementById('adm-u').value;
        const p = document.getElementById('adm-p').value;
        if(u === "moonboi" && p === "123") {
            showDashboard(true, "moonboi");
        } else {
            const { data } = await _supabase.from('admin_accounts').select('*').eq('username', u).eq('password', p);
            if(data && data.length > 0) showDashboard(false, u);
            else alert("Wrong Credentials!");
        }
    }

    function showDashboard(isHead, name) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Welcome, " + name;
        if(isHead) { document.getElementById('moonboi-ctrl').style.display = 'block'; fetchAdmins(); }
        fetchManageList();
    }

    async function uploadTournament() {
        await _supabase.from('tournaments').insert([{
            title: document.getElementById('t-name').value,
            prize: document.getElementById('t-prize').value,
            time: document.getElementById('t-time').value,
            status: document.getElementById('t-status').value
        }]);
        alert("Published!");
        fetchManageList();
    }

    // LIST FOR PUBLIC
    async function loadData(filter) {
        const display = document.getElementById('list-display');
        let { data } = await _supabase.from('tournaments').select('*').eq('status', filter).order('created_at', { ascending: false });
        display.innerHTML = (data && data.length > 0) ? "" : `<p>No ${filter} tournaments.</p>`;
        data?.forEach(t => {
            display.innerHTML += `<div class="tourney-card"><h3>${t.title}</h3><p>${t.prize} | ${t.time}</p></div>`;
        });
    }

    // LIST FOR ADMINS (WITH STATUS BOX)
    async function fetchManageList() {
        const list = document.getElementById('admin-manage-list');
        let { data } = await _supabase.from('tournaments').select('*').order('created_at', { ascending: false });
        list.innerHTML = "";
        data?.forEach(t => {
            list.innerHTML += `
                <div class="manage-item">
                    <div>
                        <b>${t.title}</b> 
                        <span class="status-pill ${t.status}">${t.status}</span>
                    </div>
                    <button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteTourney('${t.id}')">Delete</button>
                </div>`;
        });
    }

    async function deleteTourney(id) {
        if(confirm("Remove this tournament?")) {
            await _supabase.from('tournaments').delete().eq('id', id);
            fetchManageList();
        }
    }

    // ADMIN MANAGEMENT
    async function addAdminAcc() {
        await _supabase.from('admin_accounts').insert([{ username: document.getElementById('new-adm-u').value, password: document.getElementById('new-adm-p').value }]);
        fetchAdmins();
    }

    async function fetchAdmins() {
        const box = document.getElementById('admin-list-box');
        const { data } = await _supabase.from('admin_accounts').select('*');
        box.innerHTML = "";
        data?.forEach(adm => {
            box.innerHTML += `<div class="manage-item"><span>${adm.username}</span><button onclick="deleteAdmin('${adm.id}')" style="color:red; background:none; border:none;">X</button></div>`;
        });
    }

    async function deleteAdmin(id) {
        await _supabase.from('admin_accounts').delete().eq('id', id);
        fetchAdmins();
    }

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, () => {
        loadData('upcoming'); fetchManageList();
    }).subscribe();
</script>
</body>
</html>
