<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJY COMMUNITY TOURNAMENT OFFICIAL WEBSITE</title>
    <style>
        :root { --red: #ff2b2b; --bg: #050505; --card: #121212; --border: #333; --gold: #ffd700; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        header { background: #000; border-bottom: 2px solid var(--red); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; color: var(--red); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; }
        nav { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        nav a { color: #888; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; padding: 5px 10px; transition: 0.3s; }
        nav a.active { color: var(--red); border-bottom: 2px solid var(--red); background: rgba(255, 43, 43, 0.1); }

        section { display: none; padding: 15px; min-height: 85vh; }
        section.active { display: block; }

        .announcement-bar { background: var(--red); color: black; padding: 10px; text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; border-radius: 4px; font-size: 0.8rem; }
        
        /* BRACKET LAYOUT */
        .bracket-container { overflow-x: auto; padding: 20px 0; -webkit-overflow-scrolling: touch; }
        .bracket-wrapper { position: relative; padding: 40px; min-width: 1800px; display: flex; gap: 60px; }
        canvas#line-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }
        
        .round { display: flex; flex-direction: column; justify-content: space-around; width: 160px; z-index: 1; }
        .match { background: #000; border: 1px solid var(--border); padding: 5px; margin: 15px 0; border-radius: 4px; position: relative; }
        .match.gf-box { border: 2px solid var(--gold); background: rgba(255, 215, 0, 0.1); width: 180px; }
        
        .team { display: flex; justify-content: space-between; font-size: 11px; padding: 6px; border-bottom: 1px solid #222; }
        .team input { background: transparent; border: none; color: white; width: 110px; font-size: 11px; outline: none; }
        .score { color: var(--red); font-weight: bold; cursor: pointer; min-width: 20px; text-align: center; }

        /* ADMIN */
        .admin-box { width: 350px; margin: 20px auto; border: 1px solid var(--red); padding: 25px; background: #000; }
        .admin-box input { width: 100%; padding: 10px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; }
        .admin-box button { width: 100%; padding: 12px; background: var(--red); color: #000; font-weight: bold; cursor: pointer; border: none; }

        /* DEVICE DETECTION TWEAKS */
        @media (max-width: 768px) {
            .bracket-wrapper { transform: scale(0.9); transform-origin: top left; }
            header h1 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>DJY COMMUNITY TOURNAMENT</h1>
    <nav>
        <a onclick="tab('home')" id="n-home" class="active">HOME</a>
        <a onclick="tab('tour')" id="n-tour">TOURNAMENT</a>
        <a onclick="tab('admin')" id="n-admin">ADMIN</a>
    </nav>
</header>

<section id="home" class="active">
    <div class="announcement-bar">Official DJY Tournament Hub</div>
    <div style="text-align:center;">
        <h2 style="color:var(--red)">DJY: The Clipper of MLBB</h2>
        <p>Welcome to the official community tournament portal.</p>
    </div>
</section>

<section id="tour">
    <div id="list-view">
        <div class="division-title" style="color:var(--red); padding: 10px;">🔴 LIVE TOURNAMENTS</div>
        <div id="live-list"></div>
    </div>

    <div id="detail-view" style="display:none;">
        <button onclick="closeDetail()" style="background:#333; color:white; padding:8px 15px; border:none; margin-bottom:10px;">← BACK</button>
        <div class="bracket-container">
            <div class="bracket-wrapper" id="bracket-root">
                <canvas id="line-canvas"></canvas>
                <div class="round" id="R32"></div>
                <div class="round" id="R16"></div>
                <div class="round" id="R8"></div>
                <div class="round" id="R4"></div>
                <div class="round" id="GF-COL"><div class="match gf-box" id="GF-0"></div></div>
            </div>
        </div>
    </div>
</section>

<section id="admin">
    <div id="login-ui" class="admin-box">
        <h3>ADMIN LOGIN</h3>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>
    <div id="dash-ui" class="admin-box" style="display:none;">
        <h3>COMMAND CENTER</h3>
        <button onclick="createTour()">+ NEW TOURNAMENT</button>
        <div id="admin-tour-manager" style="margin-top:20px;"></div>
    </div>
</section>

<script>
    let tournaments = JSON.parse(localStorage.getItem('djy_data')) || [];
    let currentUser = null;
    let activeId = null;

    function tab(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
        if(id === 'tour') renderTourList();
    }

    // --- CANVAS ENGINE (Detects positions and draws lines) ---
    function drawBracketLines() {
        const canvas = document.getElementById('line-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const root = document.getElementById('bracket-root');
        
        // Match canvas size to the scrollable bracket area
        canvas.width = root.scrollWidth;
        canvas.height = root.scrollHeight;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;

        const rounds = ['R32', 'R16', 'R8', 'R4', 'GF-COL'];
        
        for (let i = 0; i < rounds.length - 1; i++) {
            const matches = document.getElementById(rounds[i]).querySelectorAll('.match');
            const nextRoundMatches = document.getElementById(rounds[i+1]).querySelectorAll('.match');

            matches.forEach((m, idx) => {
                const targetMatch = nextRoundMatches[Math.floor(idx / 2)];
                if (targetMatch) {
                    const startX = m.offsetLeft + m.offsetWidth;
                    const startY = m.offsetTop + (m.offsetHeight / 2);
                    const endX = targetMatch.offsetLeft;
                    const endY = targetMatch.offsetTop + (targetMatch.offsetHeight / 2);
                    
                    const midX = startX + (endX - startX) / 2;

                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(midX, startY);
                    ctx.lineTo(midX, endY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            });
        }
    }

    // --- RENDER LOGIC ---
    function renderBracket(t) {
        const rounds = ['R32', 'R16', 'R8', 'R4'];
        rounds.forEach(r => {
            document.getElementById(r).innerHTML = t.matches[r].map((m, i) => `
                <div class="match">
                    <div class="team"><input value="${m.t1}" onchange="updateTeam('${r}',${i},1,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updateScore('${r}',${i},1)">${m.s1}</span></div>
                    <div class="team"><input value="${m.t2}" onchange="updateTeam('${r}',${i},2,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updateScore('${r}',${i},2)">${m.s2}</span></div>
                </div>
            `).join('');
        });
        
        const gf = t.matches.GF;
        document.getElementById('GF-0').innerHTML = `
            <div class="team"><input value="${gf.t1}" onchange="updateTeam('GF',0,1,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updateScore('GF',0,1)">${gf.s1}</span></div>
            <div class="team"><input value="${gf.t2}" onchange="updateTeam('GF',0,2,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updateScore('GF',0,2)">${gf.s2}</span></div>
        `;

        // Run Line Engine after bracket renders
        setTimeout(drawBracketLines, 100);
    }

    function renderTourList() {
        const list = document.getElementById('live-list');
        list.innerHTML = tournaments.map(t => `
            <div style="background:var(--card); padding:15px; margin:10px; border-radius:4px; cursor:pointer;" onclick="viewTour(${t.id})">
                ${t.name} <span style="float:right; color:var(--red);">VIEW ➔</span>
            </div>
        `).join('');
    }

    function viewTour(id) {
        activeId = id;
        const t = tournaments.find(x => x.id === id);
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        renderBracket(t);
    }

    function closeDetail() {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('detail-view').style.display = 'none';
        activeId = null;
    }

    // --- ADMIN ACTIONS ---
    function login() {
        if(document.getElementById('pass').value === 'admin123') {
            currentUser = 'admin';
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('dash-ui').style.display = 'block';
            renderAdmin();
        }
    }

    function createTour() {
        const name = prompt("Enter Tournament Name:");
        if(!name) return;
        const newT = {
            id: Date.now(),
            name: name,
            matches: {
                R32: Array(16).fill(0).map(()=>({t1:'',t2:'',s1:0,s2:0})),
                R16: Array(8).fill(0).map(()=>({t1:'',t2:'',s1:0,s2:0})),
                R8: Array(4).fill(0).map(()=>({t1:'',t2:'',s1:0,s2:0})),
                R4: Array(2).fill(0).map(()=>({t1:'',t2:'',s1:0,s2:0})),
                GF: {t1:'',t2:'',s1:0,s2:0}
            }
        };
        tournaments.push(newT);
        save();
        renderAdmin();
    }

    function updateTeam(r, i, n, v) {
        const t = tournaments.find(x => x.id === activeId);
        const m = r === 'GF' ? t.matches.GF : t.matches[r][i];
        if(n === 1) m.t1 = v; else m.t2 = v;
        save();
    }

    function updateScore(r, i, n) {
        if(!currentUser) return;
        const t = tournaments.find(x => x.id === activeId);
        const m = r === 'GF' ? t.matches.GF : t.matches[r][i];
        const s = prompt("Enter Score:", n === 1 ? m.s1 : m.s2);
        if(s !== null) {
            if(n === 1) m.s1 = s; else m.s2 = s;
            save();
            renderBracket(t);
        }
    }

    function renderAdmin() {
        document.getElementById('admin-tour-manager').innerHTML = tournaments.map((t, i) => `
            <div style="background:#111; padding:10px; margin-bottom:5px; border:1px solid #333;">
                ${t.name} <button onclick="tournaments.splice(${i},1);save();renderAdmin();" style="float:right; background:maroon; width:auto; padding:5px 10px;">DEL</button>
            </div>
        `).join('');
    }

    function save() { localStorage.setItem('djy_data', JSON.stringify(tournaments)); }

    // Redraw lines if phone screen orientation changes
    window.addEventListener('resize', () => { if(activeId) drawBracketLines(); });
</script>
</body>
</html>
