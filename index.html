<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DJY COMMUNITY TOURNAMENT OFFICIAL WEBSITE</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.12.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff2b2b; --bg: #050505; --card: #121212; --border: #333; --gold: #ffd700; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        header { background: #000; border-bottom: 2px solid var(--red); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; color: var(--red); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; }
        nav { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        nav a { color: #888; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; padding: 5px 10px; transition: 0.3s; }
        nav a.active { color: var(--red); border-bottom: 2px solid var(--red); background: rgba(255, 43, 43, 0.1); }

        section { display: none; padding: 15px; min-height: 85vh; }
        section.active { display: block; }

        .announcement-bar { background: var(--red); color: black; padding: 10px; text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; border-radius: 4px; font-size: 0.8rem; }
        
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--red); margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 15px var(--red); }
        .description { color: #bbb; max-width: 600px; margin: auto; line-height: 1.6; text-align: center; font-size: 0.9rem; }

        .division-title { color: var(--red); border-left: 4px solid var(--red); padding-left: 10px; margin: 25px 0 10px; text-transform: uppercase; font-size: 0.8rem; }
        .t-long-box { background: var(--card); border: 1px solid var(--border); padding: 15px 25px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

        /* BRACKET SYSTEM - FIXED FOR ALL DEVICES */
        .bracket-wrapper { position: relative; padding: 30px; min-width: 2200px; display: flex; flex-direction: column; align-items: flex-start; gap: 15px; }
        canvas#line-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .bracket-row { display: flex; gap: 80px; align-items: stretch; position: relative; z-index: 2; }
        .round { display: flex; flex-direction: column; justify-content: space-around; width: 140px; }
        
        .match { background: #000; border: 1px solid var(--border); padding: 5px; margin: 8px 0; border-radius: 4px; position: relative; }
        .match.gf-box { border: 2px solid var(--gold); background: rgba(255, 215, 0, 0.1); width: 160px; }
        
        .team { display: flex; justify-content: space-between; font-size: 10px; padding: 4px; border-bottom: 1px solid #222; }
        .team input { background: transparent; border: none; color: white; width: 90px; font-size: 10px; }
        .score { color: var(--red); font-weight: bold; cursor: pointer; min-width: 15px; text-align: center; }

        /* STAFF MANAGER LAYOUT FIX */
        .admin-box { width: 350px; margin: 20px auto; border: 1px solid var(--red); padding: 25px; background: #000; }
        .admin-box input, .admin-box select { width: 100%; padding: 10px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; }
        .admin-box button { width: 100%; padding: 10px; background: var(--red); color: #000; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        
        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-top: 5px; background: #111; border: 1px solid #333; border-radius: 4px; }

        @media (max-width: 768px) {
            .bracket-wrapper { scale: 0.8; transform-origin: top left; }
            .admin-box { width: 90%; }
        }
    </style>
</head>
<body>

<header>
    <h1>DJY COMMUNITY TOURNAMENT</h1>
    <nav>
        <a onclick="tab('home')" id="n-home" class="active">HOME</a>
        <a onclick="tab('tour')" id="n-tour">TOURNAMENT</a>
        <a onclick="tab('admin')" id="n-admin">ADMIN</a>
    </nav>
</header>

<section id="home" class="active">
    <div id="top-ann" class="announcement-bar">Official DJY Tournament Hub</div>
    <div style="text-align:center;">
        <img src="https://yt3.googleusercontent.com" alt="DJY PFP" class="profile-pic">
        <h2 style="color:var(--red)">DJY: The Clipper of MLBB</h2>
        <p class="description">
            DJY is a premier Mobile Legends: Bang Bang YouTuber and professional MPL athlete.
        </p>
    </div>
</section>

<section id="tour">
    <div id="list-view">
        <div class="division-title">🔴 LIVE</div><div id="live-list"></div>
        <div class="division-title">📅 UPCOMING</div><div id="upcoming-list"></div>
        <div class="division-title">🏁 FINISHED</div><div id="finished-list"></div>
    </div>

    <div id="detail-view" style="display:none;">
        <button onclick="closeDetail()" style="background:#333; color:white; padding:8px; font-size:0.7rem;">← BACK</button>
        <h2 id="det-name" style="color:var(--red); display: inline; margin-left: 15px; font-size: 1rem;"></h2>
        <div style="overflow-x:auto; margin-top: 15px; -webkit-overflow-scrolling: touch;">
            <div class="bracket-wrapper" id="bracket-root">
                <canvas id="line-canvas"></canvas>
                <div class="bracket-row">
                    <div class="round" id="R32"></div><div class="round" id="R16"></div>
                    <div class="round" id="R8"></div><div class="round" id="R4"></div>
                    <div class="round" id="GF-COL"><div class="match gf-box" id="GF-0"></div></div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="admin">
    <div id="login-ui" class="admin-box">
        <h3 style="color:var(--red); text-align:center;">ADMIN LOGIN</h3>
        <input id="user" placeholder="username"><input id="pass" type="password" placeholder="password">
        <button onclick="login()">LOGIN</button>
    </div>

    <div id="dash-ui" class="admin-box" style="display:none; width:450px;">
        <h3 style="color:var(--red); text-align:center;">COMMAND CENTER</h3>
        <div id="head-admin-tools" style="display:none; border:1px solid #222; padding:10px; margin-bottom:10px;">
            <h4 style="color:var(--red); font-size: 0.8rem;">Staff Manager</h4>
            <input id="s-u" placeholder="New User"><input id="s-p" placeholder="New Pass">
            <button onclick="addStaff()">Create Staff</button>
            <div id="s-list" style="margin-top: 10px;"></div>
        </div>
        <div style="border:1px solid #222; padding:10px; margin-bottom:10px;">
            <h4>Tournament Control</h4>
            <div id="admin-tour-manager"></div>
        </div>
        <button onclick="logout()" style="background:#333; color:white; width:100%; padding:10px;">LOGOUT</button>
    </div>
</section>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tournaments = [];
    let staff = [];
    let currentUser = null;
    let activeTourId = null;

    // --- REAL-TIME LISTENERS ---
    db.ref('tournaments').on('value', (snap) => {
        tournaments = snap.val() ? Object.values(snap.val()) : [];
        if (document.getElementById('tour').classList.contains('active')) renderTourList();
        if (activeTourId) renderBracket(tournaments.find(t => t.id === activeTourId));
    });

    db.ref('staff').on('value', (snap) => {
        staff = snap.val() ? Object.values(snap.val()) : [{u: 'moonboi', p: 'master123', role: 'head'}];
        if (currentUser && currentUser.role === 'head') renderStaffList();
    });

    // --- NAVIGATION ---
    function tab(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
        if(id === 'tour') renderTourList();
    }

    // --- CANVAS ENGINE ---
    function drawLines() {
        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');
        const root = document.getElementById('bracket-root');
        canvas.width = root.scrollWidth;
        canvas.height = root.scrollHeight;
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;

        const rounds = ['R32', 'R16', 'R8', 'R4', 'GF-COL'];
        for (let i = 0; i < rounds.length - 1; i++) {
            const matches = document.getElementById(rounds[i]).querySelectorAll('.match');
            const nextRound = document.getElementById(rounds[i+1]).querySelectorAll('.match');
            matches.forEach((m, idx) => {
                const target = nextRound[Math.floor(idx / 2)];
                if (target) {
                    const x1 = m.offsetLeft + m.offsetWidth;
                    const y1 = m.offsetTop + (m.offsetHeight / 2);
                    const x2 = target.offsetLeft;
                    const y2 = target.offsetTop + (target.offsetHeight / 2);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x1 + (x2 - x1) / 2, y1);
                    ctx.lineTo(x1 + (x2 - x1) / 2, y2);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            });
        }
    }

    // --- RENDER LOGIC ---
    function renderBracket(t) {
        if (!t) return;
        const rds = ['R32', 'R16', 'R8', 'R4'];
        rds.forEach(r => {
            document.getElementById(r).innerHTML = t.matches[r].map((m, i) => `
                <div class="match">
                    <div class="team"><input value="${m.t1}" onchange="updT('${r}',${i},1,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updS('${r}',${i},1)">${m.s1}</span></div>
                    <div class="team"><input value="${m.t2}" onchange="updT('${r}',${i},2,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updS('${r}',${i},2)">${m.s2}</span></div>
                </div>
            `).join('');
        });
        const gf = t.matches.GF;
        document.getElementById('GF-0').innerHTML = `
            <div class="team"><input value="${gf.t1}" onchange="updT('GF',0,1,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updS('GF',0,1)">${gf.s1}</span></div>
            <div class="team"><input value="${gf.t2}" onchange="updT('GF',0,2,this.value)" ${!currentUser?'readonly':''}> <span class="score" onclick="updS('GF',0,2)">${gf.s2}</span></div>
        `;
        setTimeout(drawLines, 150);
    }

    // --- SYSTEM ACTIONS ---
    function updT(r, i, n, v) {
        const t = tournaments.find(x => x.id === activeTourId);
        const m = r === 'GF' ? t.matches.GF : t.matches[r][i];
        if (n === 1) m.t1 = v; else m.t2 = v;
        db.ref('tournaments/' + t.id).set(t);
    }

    function updS(r, i, n) {
        if (!currentUser) return;
        const t = tournaments.find(x => x.id === activeTourId);
        const m = r === 'GF' ? t.matches.GF : t.matches[r][i];
        const s = prompt("Score:", n === 1 ? m.s1 : m.s2);
        if (s !== null) {
            if (n === 1) m.s1 = parseInt(s); else m.s2 = parseInt(s);
            db.ref('tournaments/' + t.id).set(t);
        }
    }

    function login() {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        const user = staff.find(s => s.u === u && s.p === p);
        if (user) {
            currentUser = user;
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('dash-ui').style.display = 'block';
            if (user.role === 'head') document.getElementById('head-admin-tools').style.display = 'block';
            renderAdminTours();
        }
    }

    function logout() { location.reload(); }
    function closeDetail() { document.getElementById('list-view').style.display = 'block'; document.getElementById('detail-view').style.display = 'none'; activeTourId = null; }
    window.addEventListener('resize', drawLines);
</script>
</body>
</html>
