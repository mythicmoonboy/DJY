<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJY MLBB HUB | PRO 2026</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --neon: #ff003c; --bg: #0a0a0a; --card: #151515; --glow: 0 0 15px #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: var(--glow); position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 10px; cursor: pointer; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; display: none; }
        .active { display: block; }
        .hero { text-align: center; padding: 40px; border: 1px solid var(--neon); background: rgba(255,0,60,0.05); border-radius: 8px; }
        .btn-neon { display: inline-block; padding: 12px 24px; border: 2px solid var(--neon); color: white; font-weight: bold; background: none; cursor: pointer; border-radius: 4px; }
        .btn-neon:hover { background: var(--neon); box-shadow: var(--glow); }
        .tourney-card { background: var(--card); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; }
        #bracket-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow: auto; padding: 50px; }
        .bracket-container { position: relative; width: 1000px; height: 600px; margin: auto; border: 1px dashed var(--neon); }
        .match-box { position: absolute; width: 140px; height: 60px; background: #111; border: 1px solid var(--neon); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; z-index: 5; }
    </style>
</head>
<body onload="initApp()">

<nav>
    <button onclick="tab('home')">Home</button>
    <button onclick="tab('tournament')">Tournament</button>
    <button onclick="tab('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="container active">
    <div class="hero">
        <h1 style="color: var(--neon); text-shadow: var(--glow); font-size: 3rem;">DJY MLBB</h1>
        <p>Real-time Sync via Paid Supabase Tier.</p>
        <div style="margin-top: 30px;">
            <a href="https://discord.gg" target="_blank" class="btn-neon" style="text-decoration:none">Tournament Discord</a>
        </div>
    </div>
</div>

<!-- TOURNAMENT -->
<div id="tournament" class="container">
    <div style="text-align: center; margin-bottom: 30px;">
        <button class="btn-neon" onclick="loadData('upcoming')">Upcoming</button>
        <button class="btn-neon" onclick="loadData('live')">Live</button>
        <button class="btn-neon" onclick="loadData('finished')">Finished</button>
    </div>
    <div id="list-display">Connecting to Supabase...</div>
</div>

<!-- BRACKET -->
<div id="bracket-screen">
    <button onclick="document.getElementById('bracket-screen').style.display='none'" style="position:fixed; top:20px; right:20px; color:white; background:red; padding:10px;">CLOSE</button>
    <h2 id="b-title" style="text-align:center; color:var(--neon);">Bracket View</h2>
    <div class="bracket-container" id="bracket-area"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="container">
    <div id="login-form" class="hero" style="max-width: 400px; margin: auto;">
        <h2>ADMIN LOGIN</h2>
        <input type="text" id="adm-u" placeholder="Username">
        <input type="password" id="adm-p" placeholder="Password">
        <button class="btn-neon" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="hero">
            <h2 id="welcome-msg">Dashboard</h2>
            <button class="btn-neon" onclick="logout()" style="font-size:10px;">LOGOUT</button>
            <hr border-color="var(--neon)">
            <input id="t-name" placeholder="Name">
            <input id="t-prize" placeholder="Prize">
            <select id="t-status">
                <option value="upcoming">Upcoming</option>
                <option value="live">Live</option>
                <option value="finished">Finished</option>
            </select>
            <button class="btn-neon" style="width:100%;" onclick="upload()">PUBLISH</button>
        </div>
        <div id="moonboi-ctrl" style="display:none; border: 2px solid gold; padding: 20px; margin-top: 30px;">
            <h3 style="color:gold">HEAD ADMIN (Moonboi)</h3>
            <div id="admin-list-box"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://yfsjflymbkbfiketvxof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bOr8dIV2-Zt_9CUpboVsBQ_pzwpyRZw'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function initApp() {
        const session = localStorage.getItem('djy_session');
        if(session) {
            const user = JSON.parse(session);
            showDash(user.isHead, user.name);
        }
    }

    function tab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'tournament') loadData('upcoming');
    }

    async function login() {
        const u = document.getElementById('adm-u').value;
        const p = document.getElementById('adm-p').value;
        if(u === "moonboi" && p === "123") {
            saveSession(true, "moonboi");
        } else {
            const { data, error } = await _supabase.from('admin_accounts').select('*').eq('username', u).eq('password', p);
            if(data && data.length > 0) saveSession(false, u);
            else alert("Login Failed: " + (error ? error.message : "Wrong Credentials"));
        }
    }

    function saveSession(isHead, name) {
        localStorage.setItem('djy_session', JSON.stringify({ isHead, name }));
        showDash(isHead, name);
    }

    function logout() { localStorage.removeItem('djy_session'); location.reload(); }

    function showDash(isHead, name) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Welcome, " + name;
        if(isHead) document.getElementById('moonboi-ctrl').style.display = 'block';
    }

    async function upload() {
        const { error } = await _supabase.from('tournaments').insert([{
            title: document.getElementById('t-name').value,
            prize: document.getElementById('t-prize').value,
            status: document.getElementById('t-status').value
        }]);
        if(error) alert("Publish Error: " + error.message);
        else { alert("Tournament Live!"); tab('tournament'); }
    }

    async function loadData(filter) {
        const display = document.getElementById('list-display');
        display.innerHTML = "Fetching from Pro Database...";
        
        let { data, error } = await _supabase.from('tournaments').select('*').eq('status', filter).order('created_at', { ascending: false });
        
        if(error) {
            display.innerHTML = "ERROR: " + error.message + ". Check if 'tournaments' table exists.";
            return;
        }

        display.innerHTML = (data && data.length > 0) ? "" : "No " + filter + " tournaments found.";
        data?.forEach(t => {
            display.innerHTML += `<div class="tourney-card" onclick="openB('${t.title}')"><h3>${t.title}</h3><p>${t.prize}</p></div>`;
        });
    }

    function openB(title) {
        document.getElementById('bracket-screen').style.display = 'block';
        document.getElementById('b-title').innerText = title;
        const area = document.getElementById('bracket-area');
        area.innerHTML = '<div class="match-box" style="left:50px;top:100px;">Team 1 vs Team 2</div>';
    }

    // Pro Realtime Listener
    _supabase.channel('custom-all-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, (payload) => {
        loadData('upcoming');
    }).subscribe();

</script>
</body>
</html>
